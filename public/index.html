<!doctype html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Мультивалютна Копілка</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 min-h-screen py-10 font-sans">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-3xl font-bold text-center text-indigo-600 mb-8">
                🐷 Мультивалютна Копілка
            </h1>

            <div class="bg-white rounded-xl shadow p-6 mb-8 text-center">
                <h2 class="text-gray-500 text-lg font-medium">Загальний баланс станом на зараз</h2>
                <div class="text-4xl font-extrabold text-gray-800 my-2" id="balance-display">
                    0.00 USD
                </div>
                <div class="flex justify-center items-center gap-2 mt-4">
                    <label class="text-sm text-gray-600">Перерахувати в:</label>
                    <select
                        id="target-currency"
                        class="border rounded px-2 py-1 bg-gray-50 font-semibold"
                    >
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="GBP">GBP (£)</option>
                        <option value="AUD">AUD ($)</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white rounded-xl shadow p-6">
                    <h3 class="text-xl font-bold text-gray-700 mb-4">Нова операція</h3>
                    <form id="tx-form" class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-600">Тип</label>
                            <select id="type" class="w-full border rounded-lg p-2 mt-1">
                                <option value="deposit">Покласти (+)</option>
                                <option value="withdrawal">Забрати (-)</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-gray-600">Сума</label>
                                <input
                                    type="number"
                                    id="amount"
                                    step="0.01"
                                    required
                                    class="w-full border rounded-lg p-2 mt-1"
                                />
                            </div>
                            <div>
                                <label class="block text-sm text-gray-600">Валюта</label>
                                <select id="currency" class="w-full border rounded-lg p-2 mt-1">
                                    <option value="USD">USD</option>
                                    <option value="EUR">EUR</option>
                                    <option value="GBP">GBP</option>
                                    <option value="AUD">AUD</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600">Дата</label>
                            <input
                                type="date"
                                id="date"
                                required
                                class="w-full border rounded-lg p-2 mt-1"
                            />
                        </div>
                        <button
                            type="submit"
                            class="w-full bg-indigo-600 text-white font-bold py-2 rounded-lg hover:bg-indigo-700 transition duration-200"
                        >
                            Виконати
                        </button>
                    </form>
                </div>

                <div class="bg-white rounded-xl shadow p-6">
                    <h3 class="text-xl font-bold text-gray-700 mb-4">Історія операцій</h3>
                    <div
                        class="overflow-y-auto max-h-64 space-y-2 pr-2"
                        id="history-container"
                    ></div>
                </div>
            </div>
        </div>

        <script src="/js/app.js" defer></script>
    </body>
</html>
